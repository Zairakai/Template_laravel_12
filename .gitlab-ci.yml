# .gitlab-ci.yml
# Generated by zairakai/laravel-dev-tools setup-package.sh
# Full-stack pipeline (PHP + JS)
#
# To regenerate:
#   bash vendor/zairakai/laravel-dev-tools/scripts/setup-package.sh --publish=gitlab-ci --force

include:
  - project: "zairakai/php-packages/laravel-dev-tools"
    ref: v2.0.3
    file: ".gitlab/ci/pipeline-laravel-fullstack.yml"

variables:
  CACHE_KEY: "my-app"
  APP_ENV: "testing"
  JS_PACKAGE_MANAGER: "npm"
