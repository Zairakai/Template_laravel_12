services:
  php:
    image: "${PHP_IMAGE}"
    container_name: "${APP_SLUG}-php"
    volumes:
      - ".:/var/www/html"
      - "./.docker/php/php.ini:/usr/local/etc/php/conf.d/99-custom.ini"
    networks:
      - app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "echo 1;"]
      interval: 10s
      retries: 3
      timeout: 5s

  nginx:
    image: "${NGINX_IMAGE}"
    container_name: "${APP_SLUG}-nginx"
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ".:/var/www/html"
      - "./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf"
    networks:
      - app
    depends_on:
      - php

  node:
    image: "${NODE_IMAGE}"
    container_name: "${APP_SLUG}-node"
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ".:/app"
    command: "tail -f /dev/null"
    networks:
      - app
    depends_on:
      - php

  mysql:
    image: "${MYSQL_IMAGE}"
    container_name: "${APP_SLUG}-mysql"
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - "app-mysql:/var/lib/mysql"
    networks:
      - app
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
      retries: 3
      timeout: 5s

  redis:
    image: "${REDIS_IMAGE}"
    container_name: "${APP_SLUG}-redis"
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - "app-redis:/data"
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s

  mailpit:
    image: "${MAILPIT_IMAGE}"
    container_name: "${APP_SLUG}-mailpit"
    ports:
      - "${FORWARD_MAILPIT_PORT:-1025}:1025"
      - "${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025"
    networks:
      - app

  minio:
    image: "${MINIO_IMAGE}"
    container_name: "${APP_SLUG}-minio"
    ports:
      - "${FORWARD_MINIO_PORT:-9000}:9000"
      - "${FORWARD_MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    volumes:
      - "app-minio:/data"
    command: 'server /data --console-address ":9001"'
    networks:
      - app
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      retries: 3
      timeout: 5s

  adminer:
    image: adminer:latest
    container_name: "${APP_SLUG}-adminer"

    ports:
      - "${FORWARD_ADMINER_PORT:-8080}:8080"
    networks:
      - app
    depends_on:
      - mysql

  redisinsight:
    image: redis/redisinsight:latest
    container_name: "${APP_SLUG}-redisinsight"

    ports:
      - "${FORWARD_REDISINSIGHT_PORT:-5540}:5540"
    networks:
      - app
    depends_on:
      - redis

networks:
  app:
    driver: bridge

volumes:
  app-mysql:
    driver: local
  app-redis:
    driver: local
  app-minio:
    driver: local
